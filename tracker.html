<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>습관 트래커</title>
<style>
  :root {
    --violet: #f4647c;
    --violet-deep: #e0445f;
    --violet-soft: #ff96a8;
    --violet-light: #ffe3e8;
    --bg: #eceef3;
    --card: #ffffff;
    --text: #3b3f4a;
    --muted: #9aa0ad;
    --border: #eceef3;
    --shadow-d: rgba(163, 177, 198, 0.55);
    --shadow-l: rgba(255, 255, 255, 0.85);
  }

  * {
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
  }

  body {
    margin: 0;
    min-height: 100vh;
    color: var(--text);
    font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    display: flex;
    justify-content: center;
    padding: 56px 16px;
    position: relative;
    overflow-x: hidden;
    background: var(--bg);
  }

  .app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 560px;
    background: var(--card);
    border-radius: 28px;
    padding: 36px 32px;
    box-shadow: 14px 14px 28px var(--shadow-d), -14px -14px 28px var(--shadow-l);
    animation: appIn 0.6s cubic-bezier(0.22, 1, 0.36, 1);
  }

  @keyframes appIn {
    from { opacity: 0; transform: translateY(16px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  h1 {
    font-size: 23px;
    font-weight: 800;
    margin: 0 0 26px;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .add-form {
    display: flex;
    gap: 10px;
    margin-bottom: 28px;
  }

  .add-form input {
    flex: 1;
    padding: 13px 20px;
    border: none;
    border-radius: 999px;
    background: var(--bg);
    font-size: 14px;
    color: var(--text);
    outline: none;
    box-shadow: inset 4px 4px 8px var(--shadow-d), inset -4px -4px 8px var(--shadow-l);
    transition: box-shadow 0.25s ease, transform 0.2s ease;
  }

  .add-form input::placeholder {
    color: var(--muted);
  }

  .add-form input:focus {
    box-shadow: inset 3px 3px 6px var(--shadow-d), inset -3px -3px 6px var(--shadow-l), 0 0 0 3px var(--violet-light);
    transform: translateY(-1px);
  }

  .add-form button {
    padding: 13px 26px;
    border: none;
    border-radius: 999px;
    background: linear-gradient(135deg, var(--violet), var(--violet-deep));
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 6px 6px 14px rgba(224, 68, 95, 0.45), -4px -4px 10px var(--shadow-l);
    transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.25s ease, filter 0.2s ease;
  }

  .add-form button:hover {
    transform: translateY(-2px);
    filter: brightness(1.05);
    box-shadow: 0 12px 26px -8px rgba(224, 68, 95, 0.7);
  }

  .add-form button:active {
    transform: translateY(0) scale(0.96);
  }

  .habit-list {
    display: flex;
    flex-direction: column;
  }

  .habit-card {
    background: var(--card);
    border: none;
    border-radius: 18px;
    padding: 16px 18px;
    margin-bottom: 14px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    box-shadow: 8px 8px 16px var(--shadow-d), -8px -8px 16px var(--shadow-l);
    transition:
      opacity 0.35s ease,
      transform 0.35s cubic-bezier(0.4, 0, 0.2, 1),
      max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1),
      margin 0.4s ease,
      padding 0.4s ease,
      box-shadow 0.25s ease;
    max-height: 220px;
    overflow: hidden;
  }

  .habit-card:hover {
    box-shadow: 10px 10px 20px var(--shadow-d), -10px -10px 20px var(--shadow-l);
    transform: translateY(-2px);
  }

  .habit-card.card-enter {
    opacity: 0;
    transform: translateY(-10px) scale(0.97);
  }

  .habit-card.card-exit {
    opacity: 0;
    transform: scale(0.92) translateX(16px);
    max-height: 0;
    margin-bottom: 0;
    padding-top: 0;
    padding-bottom: 0;
    box-shadow: none;
    pointer-events: none;
  }

  .habit-top {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .habit-name {
    flex: 0 0 auto;
    width: 92px;
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .day-row {
    flex: 1;
    display: flex;
    justify-content: space-between;
    gap: 4px;
  }

  .day {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }

  .day-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--muted);
  }

  .day-circle {
    position: relative;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: none;
    background: var(--bg);
    cursor: pointer;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 4px 4px 8px var(--shadow-d), -4px -4px 8px var(--shadow-l);
    transition:
      background 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
      transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1),
      box-shadow 0.35s ease;
  }

  .day-circle:hover {
    transform: translateY(-2px);
  }

  .day-circle:active {
    transform: scale(0.88);
  }

  .day-circle.checked {
    background: linear-gradient(135deg, var(--violet), var(--violet-deep));
    box-shadow: 3px 3px 8px rgba(224, 68, 95, 0.5), -2px -2px 6px var(--shadow-l);
  }

  .day-circle.checked.pop {
    animation: circlePop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes circlePop {
    0% { transform: scale(1); }
    45% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }

  .check-icon {
    width: 14px;
    height: 14px;
    overflow: visible;
  }

  .check-icon path {
    fill: none;
    stroke: #ffffff;
    stroke-width: 3.2;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 1;
    stroke-dashoffset: 1;
    transition: stroke-dashoffset 0.35s cubic-bezier(0.65, 0, 0.35, 1) 0.05s;
  }

  .day-circle.checked .check-icon path {
    stroke-dashoffset: 0;
  }

  .delete-btn {
    flex: 0 0 auto;
    width: 32px;
    height: 32px;
    border: none;
    background: var(--bg);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    color: var(--muted);
    box-shadow: 3px 3px 6px var(--shadow-d), -3px -3px 6px var(--shadow-l);
    transition: background 0.2s ease, color 0.2s ease, transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s ease;
  }

  .delete-btn:hover {
    background: #ffe3e3;
    color: #e2533c;
    transform: rotate(-6deg) scale(1.08);
  }

  .delete-btn:active {
    transform: scale(0.9);
  }

  .delete-btn svg {
    width: 16px;
    height: 16px;
  }

  .progress-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .progress-text {
    flex: 0 0 auto;
    min-width: 112px;
    font-size: 12px;
    font-weight: 700;
    color: var(--violet-deep);
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }

  .progress-track {
    flex: 1;
    height: 9px;
    border-radius: 999px;
    background: var(--bg);
    border: none;
    box-shadow: inset 2px 2px 4px var(--shadow-d), inset -2px -2px 4px var(--shadow-l);
    overflow: hidden;
  }

  .progress-fill {
    position: relative;
    height: 100%;
    width: 0%;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--violet), var(--violet-soft));
    overflow: hidden;
    transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .progress-fill::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(120deg, transparent 0%, rgba(255, 255, 255, 0.65) 50%, transparent 100%);
    transform: translateX(-100%);
    animation: shimmer 2.4s ease-in-out infinite;
  }

  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    55%, 100% { transform: translateX(140%); }
  }

  .empty-state {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 36px 0;
    animation: appIn 0.4s ease;
  }
</style>
</head>
<body>
  <div class="app">
    <h1>습관 트래커</h1>

    <form class="add-form" id="addForm">
      <input type="text" id="habitInput" placeholder="새 습관 추가" autocomplete="off" />
      <button type="submit">추가</button>
    </form>

    <div class="habit-list" id="habitList"></div>
  </div>

<script>
  const STORAGE_KEY = 'habit-tracker-data';
  const DAY_LABELS = ['월', '화', '수', '목', '금', '토', '일'];

  const addForm = document.getElementById('addForm');
  const habitInput = document.getElementById('habitInput');
  const habitList = document.getElementById('habitList');

  function loadHabits() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch {
      return [];
    }
  }

  function saveHabits() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(habits));
  }

  let habits = loadHabits();
  const habitRefs = new Map();
  let emptyStateEl = null;

  function calcPercent(habit) {
    const completedDays = habit.checks.filter(Boolean).length;
    return Math.round((completedDays / 7) * 100);
  }

  function animatePercentText(el, toValue) {
    const fromValue = Number(el.dataset.percent || 0);
    if (el._percentRAF) {
      cancelAnimationFrame(el._percentRAF);
      el._percentRAF = null;
    }
    if (fromValue === toValue) {
      el.textContent = `이번 주 달성률 ${toValue}%`;
      el.dataset.percent = String(toValue);
      return;
    }
    const duration = 500;
    const start = performance.now();

    function step(now) {
      const t = Math.min((now - start) / duration, 1);
      const eased = 1 - Math.pow(1 - t, 3);
      const value = Math.round(fromValue + (toValue - fromValue) * eased);
      el.textContent = `이번 주 달성률 ${value}%`;
      if (t < 1) {
        el._percentRAF = requestAnimationFrame(step);
      } else {
        el.dataset.percent = String(toValue);
        el._percentRAF = null;
      }
    }
    el._percentRAF = requestAnimationFrame(step);
  }

  function updateEmptyState() {
    if (habits.length === 0) {
      if (!emptyStateEl) {
        emptyStateEl = document.createElement('div');
        emptyStateEl.className = 'empty-state';
        emptyStateEl.textContent = '아직 추가된 습관이 없어요. 위에서 새 습관을 추가해보세요.';
        habitList.appendChild(emptyStateEl);
      }
    } else if (emptyStateEl) {
      emptyStateEl.remove();
      emptyStateEl = null;
    }
  }

  function toggleDay(habit, dayIndex, circleBtn) {
    habit.checks[dayIndex] = !habit.checks[dayIndex];
    saveHabits();

    circleBtn.classList.toggle('checked', habit.checks[dayIndex]);
    if (habit.checks[dayIndex]) {
      circleBtn.classList.remove('pop');
      void circleBtn.offsetWidth;
      circleBtn.classList.add('pop');
    }

    const refs = habitRefs.get(habit.id);
    if (refs) {
      const percent = calcPercent(habit);
      refs.progressFill.style.width = `${percent}%`;
      animatePercentText(refs.progressText, percent);
    }
  }

  function deleteHabit(habit) {
    const refs = habitRefs.get(habit.id);
    habits = habits.filter((h) => h.id !== habit.id);
    saveHabits();
    habitRefs.delete(habit.id);

    if (refs) {
      refs.card.classList.add('card-exit');
      refs.card.addEventListener('transitionend', () => {
        refs.card.remove();
        updateEmptyState();
      }, { once: true });
      setTimeout(() => {
        if (refs.card.isConnected) {
          refs.card.remove();
          updateEmptyState();
        }
      }, 500);
    } else {
      updateEmptyState();
    }
  }

  function createHabitCard(habit) {
    const card = document.createElement('div');
    card.className = 'habit-card card-enter';

    const top = document.createElement('div');
    top.className = 'habit-top';

    const name = document.createElement('div');
    name.className = 'habit-name';
    name.textContent = habit.name;
    name.title = habit.name;

    const dayRow = document.createElement('div');
    dayRow.className = 'day-row';

    DAY_LABELS.forEach((label, i) => {
      const day = document.createElement('div');
      day.className = 'day';

      const dayLabel = document.createElement('span');
      dayLabel.className = 'day-label';
      dayLabel.textContent = label;

      const circle = document.createElement('button');
      circle.type = 'button';
      circle.className = 'day-circle' + (habit.checks[i] ? ' checked' : '');

      const iconNS = 'http://www.w3.org/2000/svg';
      const svg = document.createElementNS(iconNS, 'svg');
      svg.setAttribute('class', 'check-icon');
      svg.setAttribute('viewBox', '0 0 24 24');
      const path = document.createElementNS(iconNS, 'path');
      path.setAttribute('d', 'M4 12.5 L9.5 18 L20 6');
      path.setAttribute('pathLength', '1');
      svg.appendChild(path);
      circle.appendChild(svg);

      circle.addEventListener('click', () => toggleDay(habit, i, circle));

      day.appendChild(dayLabel);
      day.appendChild(circle);
      dayRow.appendChild(day);
    });

    const deleteBtn = document.createElement('button');
    deleteBtn.type = 'button';
    deleteBtn.className = 'delete-btn';
    deleteBtn.setAttribute('aria-label', '습관 삭제');
    deleteBtn.innerHTML = `
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"></polyline>
        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
        <path d="M10 11v6"></path>
        <path d="M14 11v6"></path>
        <path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"></path>
      </svg>
    `;
    deleteBtn.addEventListener('click', () => deleteHabit(habit));

    top.appendChild(name);
    top.appendChild(dayRow);
    top.appendChild(deleteBtn);

    const progressRow = document.createElement('div');
    progressRow.className = 'progress-row';

    const progressText = document.createElement('span');
    progressText.className = 'progress-text';
    progressText.dataset.percent = '0';
    progressText.textContent = '이번 주 달성률 0%';

    const progressTrack = document.createElement('div');
    progressTrack.className = 'progress-track';

    const progressFill = document.createElement('div');
    progressFill.className = 'progress-fill';
    progressTrack.appendChild(progressFill);

    progressRow.appendChild(progressText);
    progressRow.appendChild(progressTrack);

    card.appendChild(top);
    card.appendChild(progressRow);

    return { card, progressFill, progressText };
  }

  function mountHabit(habit) {
    const refs = createHabitCard(habit);
    habitRefs.set(habit.id, refs);
    habitList.appendChild(refs.card);

    requestAnimationFrame(() => {
      refs.card.classList.remove('card-enter');
      const percent = calcPercent(habit);
      refs.progressFill.style.width = `${percent}%`;
      animatePercentText(refs.progressText, percent);
    });
  }

  function renderInitial() {
    habitList.innerHTML = '';
    habitRefs.clear();
    emptyStateEl = null;
    updateEmptyState();
    habits.forEach((habit) => mountHabit(habit));
  }

  addForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const value = habitInput.value.trim();
    if (!value) {
      return;
    }
    const habit = {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2),
      name: value,
      checks: [false, false, false, false, false, false, false],
    };
    habits.push(habit);
    saveHabits();
    habitInput.value = '';
    updateEmptyState();
    mountHabit(habit);
  });

  renderInitial();
</script>
</body>
</html>
