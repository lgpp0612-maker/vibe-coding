<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>도구 모음</title>
<style>
  :root {
    --text: #2e2e38;
    --muted: #8a8a96;
    --bg: #f4f4f7;
    --card: #ffffff;
    --border: #e6e6ec;
  }

  * { box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    color: var(--text);
    padding: 48px 16px;
  }

  .wrap {
    width: 100%;
    max-width: 640px;
  }

  h1 {
    font-size: 22px;
    font-weight: 800;
    margin: 0 0 8px;
    text-align: center;
  }

  .sub {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    margin: 0 0 32px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
  }

  .tool-card {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 24px 22px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    text-decoration: none;
    color: inherit;
    box-shadow: 0 1px 2px rgba(40, 30, 70, 0.04);
    transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.25s ease, border-color 0.25s ease;
  }

  .tool-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 16px 32px -16px rgba(40, 30, 70, 0.25);
  }

  .tool-icon {
    font-size: 26px;
  }

  .tool-name {
    font-size: 16px;
    font-weight: 700;
  }

  .tool-desc {
    font-size: 13px;
    color: var(--muted);
  }
</style>
</head>
<body>
  <div class="wrap">
    <h1>도구 모음</h1>
    <p class="sub">필요한 도구를 선택하세요</p>

    <div class="grid">
      <a class="tool-card" href="pomodoro.html">
        <span class="tool-icon">⏱️</span>
        <span class="tool-name">뽀모도로 타이머 &amp; 디데이</span>
        <span class="tool-desc">25분 집중 타이머와 디데이 계산기</span>
      </a>

      <a class="tool-card" href="tracker.html">
        <span class="tool-icon">✅</span>
        <span class="tool-name">습관 트래커</span>
        <span class="tool-desc">매주 습관 체크 및 달성률 확인</span>
      </a>
    </div>
  </div>
</body>
</html>
